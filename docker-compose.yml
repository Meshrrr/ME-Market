version: '3'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: q45f4grv22h56
      POSTGRES_DB: memarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:q45f4grv22h56@localhost:5432/memarket
      - ADMIN_API_KEY=020f9f40-1ec7-4b26-8121-acf83d2a7c5e
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data: