version: '3.8'

services:
  db:
    image: postgres:15
    container_name: memarket_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: q45f4grv22h56
      POSTGRES_DB: memarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memarket"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - memarket_network

  api:
    build: .
    container_name: memarket_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - memarket_network

volumes:
  postgres_data:

networks:
  memarket_network:
    driver: bridge
